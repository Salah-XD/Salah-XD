name: Generate Profile Widgets

# Builds the isometric 3D contribution calendar and commits the generated SVGs back
# into the repo so the README can display them. The achievements (trophy) and activity
# graph are now live image widgets embedded directly in the README, so they need no
# workflow, no token, and no commit. Runs daily and can be triggered manually.

on:
  schedule:
    - cron: "0 0 * * *" # every day at 00:00 UTC
  workflow_dispatch: # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Isometric 3D contribution calendar — uses the built-in GITHUB_TOKEN, no PAT needed.
      # Generates files into profile-3d-contrib/ (the README uses profile-night-view.svg).
      # NOTE: this action reads the user from the USERNAME env var, not a `with:` input.
      - name: Build 3D isometric calendar
        uses: yoshi389111/github-profile-3d-contrib@7d95e7d4cdc028dd1e1cbd957d65f35efb12ae39 # v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Salah-XD

      - name: Commit & push generated widgets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No widget changes to commit."
          else
            git commit -m "chore: refresh profile widgets"
            git push
          fi
